name: STL Verify (Core Capsule)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run STL capsule verification (core)
        run: bash VERIFY_STL_CAPSULE/RUN_VERIFY.sh
